# GitHub Actions mirror of .gitlab-ci.yml (the GitHub-hosted repo runs THIS).
# Same three gates: unit-test -> secret-scan -> docker-build. The test truth
# lives in the Makefile (`make test` / `make demo`) — this file only wires it up.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only reads the repo. No write scopes are requested, so the
# auto-provided GITHUB_TOKEN stays read-only (secret-scan/build need nothing more).
permissions:
  contents: read

# One in-flight run per branch/PR; a new push cancels the older run of the same
# ref. Different branches never cancel each other, and manual runs get their own
# group so they don't abort branch runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project + dev extras
        run: pip install -e ".[dev]"
      - name: Run test suite (make test)
        run: make test
      # Mechanism demos run in CI under MockLLM (zero-network, no API key).
      # `make demo` exits non-zero if any demo's contract check fails, so this
      # gates the pipeline — it is NOT guarded with `|| true`.
      - name: Run mechanism demos (make demo)
        run: make demo

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: pip install -e .
      - name: Authoritative secret-scan gate (self-written, allowlisted)
        run: python scripts/ci_secret_scan.py
      # Secondary backstop; never masks the primary gate above. gitleaks needs
      # the auto-provided read-only token to fetch PR commits — this stays within
      # the declared `contents: read` (no comments posted, no scope expansion).
      - name: gitleaks (backstop)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build runtime image (no push)
        run: docker build -t aegiscode:ci .
